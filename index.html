<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KDP Kitchen Masal</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="header">
    <div class="brand">
      <div class="logo">KDP</div>
      <div>
        <h1>KDP Kitchen Masal</h1>
        <p>Simpily Better Not the Others</p>
      </div>
    </div>
    <nav class="top-nav">
      <input type="search" id="search" placeholder="Search products..." />
      <button id="cart-btn">Cart (<span id="cart-count">0</span>)</button>
    </nav>
  </header>

  <section class="hero">
    <div class="hero-text">
      <h2>Fresh, Authentic & Premium Masala</h2>
      <p>Shop pure Nepali spices, sourced locally and freshly packed.</p>
      <button class="primary-btn" id="explore-btn">Explore Products</button>
    </div>
    <img src="t5.png" class="hero-img" alt="KDP Kitchen Masala hero banner" />
  </section>

  <section class="products">
    <h2>Our Products</h2>
    <div id="product-list" class="product-grid"></div>
  </section>

  <div id="cart-panel" class="cart-panel hidden">
    <h3>Your Cart</h3>
    <div id="cart-items"></div>
    <div class="cart-footer">
      <strong>Total: NPR <span id="cart-total">0</span></strong>
      <button class="primary-btn" onclick="checkout()">Checkout</button>
      <button class="secondary-btn" onclick="clearCart()">Clear Cart</button>
    </div>
  </div>

  <footer class="footer">
    <p>KDP Kitchen Masal © 2025 • All Rights Reserved • Make with ❤️ • Under Development</p>
  </footer>

  <script>
    const PRODUCTS = [
      {id:'001', name:'Garam Masala 100g', price:85, img:'https://via.placeholder.com/300?text=Garam+Masala'},
      {id:'002', name:'Tandoori Masala 150g', price:125, img:'https://via.placeholder.com/300?text=Tandoori+Masala'},
      {id:'003', name:'Chilli Powder 50g', price:41, img:'t1.png'},
      {id:'004', name:'Curry Powder 120g', price:120, img:'https://via.placeholder.com/300?text=Curry+Powder'},
      {id:'005', name:'Turmeric Powder 100g', price:76, img:'https://via.placeholder.com/300?text=Turmeric+100g'},
      {id:'006', name:'Cumin Seeds 80g', price:60, img:'https://via.placeholder.com/300?text=Cumin'},
      {id:'007', name:'Chilli Powder 100g', price:81, img:'t1.png'},
      {id:'008', name:'Chilli Powder 200g', price:146, img:'t1.png'},
      {id:'009', name:'Chilli Powder 500g', price:336, img:'t1.png'},
      {id:'010', name:'Turmeric Powder 50g', price:36, img:'t3.png'},
      {id:'011', name:'Turmeric Powder 200g', price:126, img:'t3.png'},
      {id:'012', name:'Turmeric Powder 500g', price:276, img:'t3.png'},
      {id:'013', name:'Coriander Powder 50g', price:36, img:'t2.png'},
      {id:'014', name:'Coriander Powder 100g', price:76, img:'t2.png'},
      {id:'015', name:'Coriander Powder 200g', price:126, img:'t2.png'},
      {id:'016', name:'Coriander Powder 500g', price:276, img:'t2.png'}
    ];

    let cart = JSON.parse(localStorage.getItem('kdp_cart') || '{}');

    function renderProducts(filterText = ''){
      const list = document.getElementById('product-list');
      list.innerHTML = '';

      const term = filterText.trim().toLowerCase();

      PRODUCTS
        .filter(p => !term || p.name.toLowerCase().includes(term))
        .forEach(p => {
        const card = document.createElement('div');
        card.className = 'product-card';
        card.innerHTML = `
          <img src="${p.img}" alt="${p.name}" />
          <h3>${p.name}</h3>
          <p class="price">NPR ${p.price}</p>
          <button onclick="addToCart('${p.id}')">Add to Cart</button>
        `;
        list.appendChild(card);
      });
    }

    function addToCart(id){
      cart[id] = (cart[id] || 0) + 1;
      saveCart();
    }

    function saveCart(){
      localStorage.setItem('kdp_cart', JSON.stringify(cart));
      renderCart();
    }

    function renderCart(){
      const items = document.getElementById('cart-items');
      items.innerHTML = '';
      let total = 0;
      let count = 0;

      for(const id in cart){
        const p = PRODUCTS.find(x => x.id === id);
        const qty = cart[id];
        total += p.price * qty;
        count += qty;

        const row = document.createElement('div');
        row.className = 'cart-item';
        row.innerHTML = `
          <img src="${p.img}" alt="${p.name} in cart" />
          <div>
            <strong>${p.name}</strong><br>
            NPR ${p.price} × ${qty}
          </div>
          <button onclick="changeQty('${id}', -1)">-</button>
          <button onclick="changeQty('${id}', 1)">+</button>
        `;
        items.appendChild(row);
      }

      document.getElementById('cart-total').innerText = total;
      document.getElementById('cart-count').innerText = count;
    }

    function changeQty(id, val){
      cart[id] += val;
      if(cart[id] <= 0) delete cart[id];
      saveCart();
    }

    function clearCart(){
      cart = {};
      saveCart();
    }

    function checkout(){
      const total = document.getElementById('cart-total').innerText;
      if (!total || total === '0') {
        alert('Your cart is empty. कृपया पहिले केही मसला जोड्नुहोस्।');
        return;
      }
      alert(`धन्यवाद! Your order for NPR ${total} has been placed.\n(This is a demo checkout – no real payment.)`);
      clearCart();
    }

    document.getElementById('cart-btn').onclick = () => {
      document.getElementById('cart-panel').classList.toggle('hidden');
    };

    document.getElementById('explore-btn').onclick = () => {
      document.querySelector('.products').scrollIntoView({behavior: 'smooth'});
    };

    document.getElementById('search').addEventListener('input', (e) => {
      renderProducts(e.target.value);
    });

    renderProducts();
    renderCart();
  </script>
</body>
</html>
